<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VTP E2E fixture</title>
    <style>
      html,
      body {
        margin: 0;
        background: #111;
      }
      video {
        width: 640px;
        height: 360px;
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- A finite VOD: non-live, so it honours playbackRate. Audio compression tests
       replace this with a blob URL before asking Web Audio to capture it. -->
    <video id="v" src="sample.webm" playsinline preload="auto"></video>
  </body>
</html>
