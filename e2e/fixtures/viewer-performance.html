<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VTP viewer cadence fixture</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #161616;
      }
      #player {
        position: relative;
        width: 960px;
        height: 540px;
        margin: 40px auto;
        overflow: hidden;
        background: #000;
      }
      video {
        display: block;
        width: 100%;
        height: 100%;
      }
      button {
        position: absolute;
        right: 16px;
        bottom: 16px;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div id="player">
      <video id="video" autoplay muted playsinline></video>
      <button id="native-control">Native control</button>
    </div>
    <canvas id="source" width="640" height="360" hidden></canvas>
    <script>
      const canvas = document.getElementById("source");
      const ctx = canvas.getContext("2d");
      const video = document.getElementById("video");
      let frame = 0;
      const draw = () => {
        frame += 1;
        ctx.fillStyle = `hsl(${frame % 360} 72% 42%)`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "700 72px system-ui";
        ctx.fillText(String(frame), 40, 100);
        requestAnimationFrame(draw);
      };
      draw();
      video.srcObject = canvas.captureStream(30);
      const capture = video.captureStream?.bind(video);
      document.body.dataset.captureCalls = "0";
      if (capture) {
        video.captureStream = () => {
          document.body.dataset.captureCalls = String(
            Number(document.body.dataset.captureCalls || 0) + 1,
          );
          return capture();
        };
      }
      document.getElementById("native-control").addEventListener("click", () => {
        document.body.dataset.nativeControl = "clicked";
      });
    </script>
  </body>
</html>
